name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/main ref for versionCode
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          ndk-version: "29.0.14033849"
          packages: |
            build-tools;34.0.0
            platforms;android-34

      - name: Prepare signing files
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required_secrets=("SIGNING_KEYSTORE_BASE64" "SIGNING_STORE_PASSWORD" "SIGNING_KEY_ALIAS" "SIGNING_KEY_PASSWORD")
          missing_secrets=()
          for secret in "${required_secrets[@]}"; do
            if [ -z "${!secret}" ]; then
              missing_secrets+=("$secret")
            fi
          done
          
          if [ ${#missing_secrets[@]} -gt 0 ]; then
            echo "Error: Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi

          echo "${SIGNING_KEYSTORE_BASE64}" | base64 --decode > "${GITHUB_WORKSPACE}/release.keystore"
          if [ ! -f "${GITHUB_WORKSPACE}/release.keystore" ]; then
            echo "Error: Keystore file not created successfully"
            exit 1
          fi

          {
            echo "alias=${SIGNING_KEY_ALIAS}"
            echo "keyPassword=${SIGNING_KEY_PASSWORD}"
            echo "password=${SIGNING_STORE_PASSWORD}"
            echo "file=${GITHUB_WORKSPACE}/release.keystore"
          } > "${GITHUB_WORKSPACE}/sign.properties"

      - name: Build release APKs (split by ABI)
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: $ANDROID_SDK_ROOT/ndk/29.0.14033849

      - name: Verify APK outputs
        id: verify_apks
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          apks=(app/build/outputs/apk/release/*-release.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "Error: No valid release APK files found under app/build/outputs/apk/release/"
            echo "Found files:"
            ls -la app/build/outputs/apk/release/
            exit 1
          fi
          printf 'Found valid release APKs:\n%s\n' "${apks[@]}"
          echo "apks=$(printf "%s\n" "${apks[@]}" | jq -R . | jq -s .)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ fromJSON(steps.verify_apks.outputs.apks) }}
        if: steps.verify_apks.outcome == 'success'